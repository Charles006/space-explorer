name: Android CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create local.properties with DEMO_KEY
        run: |
          echo "sdk.dir=/usr/local/lib/android/sdk" > local.properties
          echo "NASA_API_KEY=DEMO_KEY" >> local.properties

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run unit tests
        run: ./gradlew test --no-daemon --stacktrace

      - name: Verify formatting
        run: ./gradlew spotlessCheck --no-daemon

      - name: Run detekt
        run: ./gradlew detekt --no-daemon

      - name: Coverage report (XML for Codecov)
        run: ./gradlew koverXmlReportDebug --no-daemon

      - name: Coverage threshold check
        run: ./gradlew koverVerifyDebug --no-daemon

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: app/build/reports/kover/reportDebug.xml
          flags: unittests
          fail_ci_if_error: false

      - name: Upload detekt report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-report
          path: app/build/reports/detekt/

      - name: Assemble debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: app/build/reports/tests/
